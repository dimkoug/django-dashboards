server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Django's collected static (admin, DRF browsable API) lives in a volume
    # shared with the backend container, mounted here read-only.
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Uploaded attachments (shared volume with the backend, read-only).
    location /media/ {
        alias /app/mediafiles/;
        access_log off;
        expires 7d;
    }

    # API + admin -> Django running under uvicorn (ASGI). `web` is the
    # compose service name; no URI on proxy_pass keeps the path intact.
    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Channels) -> uvicorn. Needs the HTTP/1.1 upgrade dance.
    location /ws/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA: let the client router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
